name: Android CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.10.2

      - name: Build
        run: ./gradlew assembleDebug

      - name: Prepare release APK
        if: github.event_name == 'push'
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/*.apk release/PastelBoard-debug.apk

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: PastelBoard-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Publish latest debug APK
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: debug-latest
          name: PastelBoard Debug Latest
          body: 自动构建的最新 Debug APK。
          prerelease: true
          make_latest: false
          files: release/PastelBoard-debug.apk

      - name: Publish v0.2.1 debug APK
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.2.1
          name: PastelBoard v0.2.1
          body: |
            v0.2.1：精简主页设备选择页、优化蓝牙设备显示、修复键盘测试页按键音加载、让键帽呈现磨砂玻璃质感，并将金色烟花放到键帽上方，放大且持续 1.5 秒。
          prerelease: false
          make_latest: true
          files: release/PastelBoard-debug.apk
