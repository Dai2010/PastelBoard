name: Android CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.10.2

      - name: Build
        run: ./gradlew assembleDebug

      - name: Prepare release APK
        if: github.event_name == 'push'
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/*.apk release/PastelBoard-internal-test.apk

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: PastelBoard-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Publish internal test APK
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: internal-test-latest
          name: PastelBoard 内部测试版 0.2.3-internal.1
          body: |
            ⚠️ 内部测试版，请勿作为正式版分发。

            版本：0.2.3-internal.1（versionCode 5）

            本版本用于排查「蓝牙连接成功但目标电脑无输入响应」问题：
            - 新增「内部测试日志」页面，实时记录蓝牙 HID 连接、按键、触控板与报告发送结果。
            - 支持在日志页点击「选择位置导出」，通过系统文件选择器把日志保存到任意位置。
            - 发行产物名称明确标注为内部测试版 APK。
          prerelease: true
          make_latest: false
          overwrite_files: true
          files: release/PastelBoard-internal-test.apk
