name: Android CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.10.2

      - name: Build
        run: ./gradlew assembleDebug

      - name: Prepare release APK
        if: github.event_name == 'push'
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/*.apk release/PastelBoard-debug.apk

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: PastelBoard-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Publish latest debug APK
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: debug-latest
          name: PastelBoard Debug Latest
          body: 自动构建的最新 Debug APK。
          prerelease: true
          make_latest: false
          files: release/PastelBoard-debug.apk

      - name: Publish v0.2.0 debug APK
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.2.0
          name: PastelBoard v0.2.0
          body: |
            v0.2.0：新增侧边展开菜单、键盘测试页、自定义按键音、自定义键帽颜色、开启即横屏，以及更宽松清晰的界面布局。
          prerelease: false
          make_latest: true
          files: release/PastelBoard-debug.apk
